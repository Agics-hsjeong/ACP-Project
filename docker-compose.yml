services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      ORIGIN: http://localhost:28433
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "28433:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
