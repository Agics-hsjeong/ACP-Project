services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: acp
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: acp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acp -d acp']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # 호스트 /ARCHIVE/acp/minio 에 MinIO 데이터 영구 저장 (DoRaGi-LM 패턴)
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-acp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-acpminio123}
    volumes:
      - /ARCHIVE/acp/minio:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - '8000'
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      MINIO_ENDPOINT: minio:9000
      ARCHIVE_PROJECT: acp
      ARCHIVE_BASE: /ARCHIVE/acp
      ARCHIVE_ROOT: /ARCHIVE/acp/data
      ARCHIVE_MODELS_ROOT: /ARCHIVE/acp/models
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/secrets/firebase-service-account.json
      DJANGO_SECRET_KEY: dev-secret-change-in-production
      DJANGO_DEBUG: '1'
      DJANGO_ALLOWED_HOSTS: '*'
      CORS_ALLOWED_ORIGINS: http://localhost:28433,http://localhost:5173,http://192.168.0.63:28433,http://acp.local:28433
    volumes:
      - /ARCHIVE:/ARCHIVE
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE: /api
        PUBLIC_FIREBASE_API_KEY: ${PUBLIC_FIREBASE_API_KEY:-}
        PUBLIC_FIREBASE_AUTH_DOMAIN: ${PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        PUBLIC_FIREBASE_PROJECT_ID: ${PUBLIC_FIREBASE_PROJECT_ID:-}
        PUBLIC_FIREBASE_STORAGE_BUCKET: ${PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        PUBLIC_FIREBASE_APP_ID: ${PUBLIC_FIREBASE_APP_ID:-}
        PUBLIC_FIREBASE_MEASUREMENT_ID: ${PUBLIC_FIREBASE_MEASUREMENT_ID:-}
        LAN_TRUSTED_ORIGINS: ${LAN_TRUSTED_ORIGINS:-http://192.168.0.63:28433,http://acp.local:28433}
    expose:
      - '3000'
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      ORIGIN: http://localhost:28433
      PUBLIC_API_BASE: /api
      PUBLIC_FIREBASE_API_KEY: ${PUBLIC_FIREBASE_API_KEY:-}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      PUBLIC_FIREBASE_PROJECT_ID: ${PUBLIC_FIREBASE_PROJECT_ID:-}
      PUBLIC_FIREBASE_STORAGE_BUCKET: ${PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      PUBLIC_FIREBASE_APP_ID: ${PUBLIC_FIREBASE_APP_ID:-}
      PUBLIC_FIREBASE_MEASUREMENT_ID: ${PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '28433:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
